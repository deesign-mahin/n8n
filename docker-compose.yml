services:
  n8n:

    image: docker.n8n.io/n8nio/n8n:latest

    container_name: n8n

    restart: unless-stopped

    ports:
      - "5678:5678"

    environment:

      TZ: Asia/Dhaka

      N8N_HOST: ${N8N_HOST}

      N8N_PORT: 5678

      N8N_PROTOCOL: https

      WEBHOOK_URL: https://${N8N_HOST}

      NODE_ENV: ${NODE_ENV}

      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}

      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}

      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}

      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}

      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}

      N8N_ENDPOINT_WEBHOOK: ${N8N_ENDPOINT_WEBHOOK}

      N8N_ENDPOINT_WEBHOOK_TEST: ${N8N_ENDPOINT_WEBHOOK_TEST}

      DB_TYPE: ${DB_TYPE}

      DB_POSTGRESDB_HOST: ${DB_POSTGRESDB_HOST}

      DB_POSTGRESDB_PORT: ${DB_POSTGRESDB_PORT}

      DB_POSTGRESDB_DATABASE: ${DB_POSTGRESDB_DATABASE}

      DB_POSTGRESDB_USER: ${DB_POSTGRESDB_USER}

      DB_POSTGRESDB_PASSWORD: ${DB_POSTGRESDB_PASSWORD}

      DB_POSTGRESDB_SCHEMA: ${DB_POSTGRESDB_SCHEMA}

      DB_POSTGRESDB_SSL_ENABLED: ${DB_POSTGRESDB_SSL_ENABLED}

      DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED: ${DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED}

    volumes:

      - ./n8n_data:/home/node/.n8n
